<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Predict456</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --green: #00ff6a; --green-glow: rgba(0,255,106,0.6); }

    html, body {
      width: 100%; min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
    }

    body {
      background: url('sid.png') center center / cover no-repeat fixed;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 60px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 70%, rgba(0,10,5,0.75) 100%);
      z-index: 0;
    }

    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--green); opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    .contact-section {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }

    .contact-label {
      font-size: 11px; letter-spacing: 3px;
      color: var(--green); text-transform: uppercase;
      font-weight: 700; text-shadow: 0 0 12px var(--green-glow);
      animation: fadeIn 1s ease both;
    }

    .contact-btn {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 18px 56px; border-radius: 100px;
      background: rgba(0,0,0,0.4); color: #fff;
      font-size: 16px; font-weight: 900;
      letter-spacing: 2.5px; text-transform: uppercase;
      text-decoration: none; border: 2px solid var(--green);
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
      animation: fadeIn 1s 0.2s ease both, glow-pulse 2s 1.2s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 0 20px rgba(0,255,106,0.4), 0 0 50px rgba(0,255,106,0.15); }
      50%      { box-shadow: 0 0 0 6px rgba(0,255,106,0.1), 0 0 40px rgba(0,255,106,0.7), 0 0 90px rgba(0,255,106,0.3); }
    }
    .contact-btn:hover {
      background: rgba(0,255,106,0.15); color: var(--green);
      transform: scale(1.05);
      box-shadow: 0 0 60px rgba(0,255,106,0.8), 0 0 120px rgba(0,255,106,0.3);
    }
    .contact-btn:active { transform: scale(0.97); }
    .btn-icon { font-size: 20px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="contact-section">
    <span class="contact-label">📬 &nbsp; Get in Touch</span>
    <a href="https://t.me/Predict456" target="_blank" rel="noopener" class="contact-btn">
      <span class="btn-icon">✉</span>
      Contact Me
    </a>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px; height: ${size}px;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 10}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
