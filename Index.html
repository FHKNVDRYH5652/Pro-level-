<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gojo Prediction Pro Max</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:'Rajdhani',sans-serif;background:#05030f;color:#fff;overflow:hidden}

.bg{position:fixed;inset:0;background:url('1.png') center center/cover no-repeat;z-index:0}
.bg-ov{
  position:fixed;inset:0;
  background:linear-gradient(180deg,rgba(5,3,15,0.22) 0%,rgba(5,3,15,0.18) 22%,rgba(5,3,15,0.62) 58%,rgba(5,3,15,0.97) 100%);
  z-index:1;
}

.page{position:relative;z-index:2;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:space-between}

.status-bar{position:fixed;top:10px;right:12px;display:flex;align-items:center;gap:5px;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:rgba(148,163,184,.55);z-index:20}
.s-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e;animation:lp 1.2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}

.mid-section{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:0 14px}
.bot-section{width:100%;padding:10px 14px 18px;flex-shrink:0}

/* ── PRED BOX ── */
.pred-wrap{width:100%;max-width:360px}
.pred-box{
  background:rgba(9,3,25,0.86);
  border:1.5px solid rgba(168,85,247,0.58);
  border-radius:16px;padding:13px 16px 15px;position:relative;
  backdrop-filter:blur(16px);
  box-shadow:0 0 0 1px rgba(124,58,237,0.10),0 0 40px rgba(124,58,237,0.26),inset 0 0 40px rgba(76,29,149,0.10);
}
.c{position:absolute;width:12px;height:12px;border-color:rgba(168,85,247,0.75);border-style:solid}
.c.tl{top:7px;left:7px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.c.tr{top:7px;right:7px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.c.bl{bottom:7px;left:7px;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
.c.br{bottom:7px;right:7px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}
.tick{position:absolute;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:3px}
.tick.left{left:6px}.tick.right{right:6px}
.tick span{display:block;width:3px;height:3px;background:rgba(168,85,247,0.35);border-radius:1px}

.period-label{text-align:center;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:4px;color:rgba(168,85,247,0.85);margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:8px}
.period-label::before,.period-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(168,85,247,0.38),transparent);max-width:45px}

.period-number{text-align:center;font-family:'Orbitron',sans-serif;font-size:clamp(10px,2.7vw,15px);font-weight:700;color:#fff;letter-spacing:1.5px;margin-bottom:11px;display:flex;align-items:center;justify-content:center;gap:8px}
.period-number .arr{color:rgba(168,85,247,0.85);font-size:11px}

.num-display{background:rgba(3,1,12,0.80);border:1.5px solid rgba(100,50,200,0.32);border-radius:10px;padding:14px 18px 12px;text-align:center;position:relative}
.num-display::before{content:'';position:absolute;left:8px;top:50%;transform:translateY(-50%);width:2px;height:42%;background:linear-gradient(to bottom,transparent,rgba(124,58,237,0.5),transparent);border-radius:2px}
.num-display::after{content:'';position:absolute;right:8px;top:50%;transform:translateY(-50%);width:2px;height:42%;background:linear-gradient(to bottom,transparent,rgba(124,58,237,0.5),transparent);border-radius:2px}

.predicted-num{font-family:'Orbitron',sans-serif;font-size:clamp(54px,14vw,76px);font-weight:900;line-height:1;display:block;transition:color .5s,text-shadow .5s;animation:pulse 2.5s ease-in-out infinite}
.predicted-num.num-red   {color:#ef4444;text-shadow:0 0 26px rgba(239,68,68,.75),0 0 65px rgba(239,68,68,.28)}
.predicted-num.num-green {color:#22c55e;text-shadow:0 0 26px rgba(34,197,94,.75),0 0 65px rgba(34,197,94,.28)}
.predicted-num.num-violet{color:#a855f7;text-shadow:0 0 26px rgba(168,85,247,.75),0 0 65px rgba(168,85,247,.28)}
.predicted-num.idle      {color:#334155;font-size:22px;padding:18px 0;animation:none}
@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}

/* scanning animation when loading */
.predicted-num.scanning{
  color:#7c3aed;font-size:22px;padding:18px 0;animation:scan 0.4s linear infinite;
  text-shadow:0 0 18px rgba(168,85,247,.9);
}
@keyframes scan{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}

.num-sub{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:4px;color:rgba(148,163,184,.60);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.num-sub::before,.num-sub::after{content:'··';color:rgba(168,85,247,.55)}

.pred-tags{display:flex;justify-content:center;gap:7px;margin-top:9px;flex-wrap:wrap}
.ptag{padding:3px 10px;border-radius:20px;font-size:9px;font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:2px;opacity:0;transition:opacity .4s}
.ptag.show{opacity:1}
.ptag.red   {background:rgba(239,68,68,.13);border:1px solid rgba(239,68,68,.50);color:#ef4444}
.ptag.green {background:rgba(34,197,94,.13);border:1px solid rgba(34,197,94,.50);color:#22c55e}
.ptag.violet{background:rgba(168,85,247,.13);border:1px solid rgba(168,85,247,.50);color:#a855f7}
.ptag.big   {background:rgba(251,191,36,.10);border:1px solid rgba(251,191,36,.42);color:#fbbf24}
.ptag.small {background:rgba(56,189,248,.10);border:1px solid rgba(56,189,248,.42);color:#38bdf8}

.live-bar{display:flex;align-items:center;justify-content:space-between;margin-top:9px;font-size:8px;color:rgba(148,163,184,.50);font-family:'Orbitron',sans-serif;letter-spacing:1px}
.live-ind{display:flex;align-items:center;gap:5px;color:#22c55e;font-size:8px}
.live-ind .dot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:lp 1.2s ease-in-out infinite}
.error-msg{display:none;text-align:center;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;color:rgba(239,68,68,0.75);margin-top:6px}

/* ── GENERATE BUTTON ── */
.btn-wrap{width:100%;max-width:360px}
.gen-btn{
  width:100%;display:flex;align-items:center;
  background:linear-gradient(90deg,#5b21b6 0%,#7c3aed 55%,#8b5cf6 100%);
  border:none;border-radius:12px;cursor:pointer;overflow:hidden;
  box-shadow:0 0 30px rgba(124,58,237,.50),0 3px 20px rgba(76,29,149,.40);
  transition:box-shadow .3s,transform .15s;position:relative;
}
.gen-btn:hover{box-shadow:0 0 50px rgba(168,85,247,.68),0 4px 30px rgba(124,58,237,.48);transform:translateY(-1px)}
.gen-btn:active{transform:translateY(1px)}
.gen-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.gen-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);transform:translateX(-100%);animation:shim 3s infinite}
@keyframes shim{100%{transform:translateX(100%)}}
.btn-img{width:54px;height:54px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.22);border-radius:12px 0 0 12px;flex-shrink:0;overflow:hidden;font-size:18px}
.btn-img img{width:100%;height:100%;object-fit:cover}
.btn-txt{flex:1;text-align:center;padding:0 8px}
.btn-main{font-family:'Orbitron',sans-serif;font-size:clamp(12px,3vw,16px);font-weight:900;color:#fff;letter-spacing:2px;display:block;text-shadow:0 0 14px rgba(255,255,255,.25)}
.btn-sub{font-family:'Orbitron',sans-serif;font-size:8px;color:#c084fc;letter-spacing:2.5px;display:block;margin-top:2px}
.btn-arr{width:42px;height:54px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.22);border-radius:0 12px 12px 0;border-left:1px solid rgba(255,255,255,.10);color:#fff;font-size:20px;font-weight:700;flex-shrink:0}

/* ── FEATURE BOXES ── */
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;max-width:360px;margin:0 auto}
.feat-box{background:rgba(7,2,20,0.83);border:1px solid rgba(124,58,237,0.32);border-radius:10px;padding:9px 7px;display:flex;flex-direction:column;align-items:flex-start;gap:6px;backdrop-filter:blur(8px);transition:border-color .3s,box-shadow .3s}
.feat-box:hover{border-color:rgba(168,85,247,.55);box-shadow:0 0 18px rgba(124,58,237,.20)}
.feat-icon{width:28px;height:28px;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(124,58,237,.13);border:1px solid rgba(124,58,237,.28);font-size:13px;flex-shrink:0}
.feat-icon img{width:100%;height:100%;object-fit:cover}
.feat-title{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;color:#fff;letter-spacing:.5px;line-height:1.3}
.feat-desc{font-size:8px;color:#4b5563;line-height:1.4;margin-top:1px}
</style>

  <div class="mid-section">
    <div class="pred-wrap">

        <div class="c tl"></div><div class="c tr"></div>

<script>
// ══════════════════════════════════════════════
// WINGO RULES
// ══════════════════════════════════════════════
const NUM_RULES = {
  0:{primary:'red',  violet:true,  size:'small'},
  1:{primary:'green',violet:false, size:'small'},
  2:{primary:'red',  violet:false, size:'small'},
  3:{primary:'green',violet:false, size:'small'},
  4:{primary:'red',  violet:false, size:'small'},
  5:{primary:'green',violet:true,  size:'big'},
  6:{primary:'red',  violet:false, size:'big'},
  7:{primary:'green',violet:false, size:'big'},
  8:{primary:'red',  violet:false, size:'big'},
  9:{primary:'green',violet:false, size:'big'},
};
const getColor    = n => NUM_RULES[n].primary;
const isViolet    = n => NUM_RULES[n].violet;
const getSize     = n => NUM_RULES[n].size;
const getNumClass = n => isViolet(n) ? 'num-violet' : `num-${getColor(n)}`;

// ══════════════════════════════════════════════
// API
// ══════════════════════════════════════════════
const BASE_URL = 'https://wingolast100.vercel.app/api/results?typeId=1&apiKey=12a04165-748c-4144-9398-96bd2e0ad956&token=1a97a413-ff57-4097-a44c-4bd402ace8d5&limit=100';
const PROXIES = [
  () => BASE_URL,
  () => `https://api.allorigins.win/raw?url=${encodeURIComponent(BASE_URL)}`,
  () => `https://corsproxy.io/?${encodeURIComponent(BASE_URL)}`,
  () => `https://thingproxy.freeboard.io/fetch/${BASE_URL}`,
  () => `https://proxy.cors.sh/${BASE_URL}`,
];

let proxyIdx = 0;
let history  = [];   // sorted newest first
let lastPeriod = null;
let consecutiveFails = 0;

// ══════════════════════════════════════════════
// STATE  (prediction only shows on button click)
// ══════════════════════════════════════════════
let predictionReady = false;   // true after first fetch succeeds
let isGenerating    = false;

// ══════════════════════════════════════════════
// PARSE
// ══════════════════════════════════════════════
function parseResults(raw){
  let data = raw;
  if(typeof raw === 'string'){
    try{ data = JSON.parse(raw.trim().replace(/^\uFEFF/,'')) }catch(e){ return [] }
  }
  let list = [];
  if(Array.isArray(data))                    list = data;
  else if(Array.isArray(data?.data?.list))   list = data.data.list;
  else if(Array.isArray(data?.data?.data))   list = data.data.data;
  else if(Array.isArray(data?.data))         list = data.data;
  else if(Array.isArray(data?.list))         list = data.list;
  else if(Array.isArray(data?.result))       list = data.result;
  else if(Array.isArray(data?.results))      list = data.results;
  else if(Array.isArray(data?.records))      list = data.records;
  else if(Array.isArray(data?.rows))         list = data.rows;
  else if(data?.code===0||data?.code===200){
    const inner = data.data||data.result||data.results;
    if(Array.isArray(inner))             list = inner;
    else if(Array.isArray(inner?.list))  list = inner.list;
  }
  return list.map(item=>{
    const period = String(item.issueNumber??item.period??item.periodNumber??item.issue??item.no??item.prdno??item.id??'');
    let rawNum   = item.number??item.openCode??item.result??item.num??item.winNum??item.open??item.code??-1;
    if(typeof rawNum==='string') rawNum = rawNum.split(',')[0].trim();
    const number = parseInt(rawNum,10);
    return {period,number};
  }).filter(x=>x.period.length>0 && Number.isInteger(x.number) && x.number>=0 && x.number<=9);
}

// ══════════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════════
async function fetchResults(){
  for(let i=0; i<PROXIES.length; i++){
    const idx = (proxyIdx+i) % PROXIES.length;
    const url = PROXIES[idx]();
    try{
      const ctrl = new AbortController();
      const tid  = setTimeout(()=>ctrl.abort(), 9000);
      const res  = await fetch(url,{cache:'no-store',signal:ctrl.signal,headers:{'Accept':'application/json,text/plain,*/*'}});
      clearTimeout(tid);
      if(!res.ok) continue;
      const text = await res.text();
      if(!text||text.includes('Host not in allowlist')||text.startsWith('Error')) continue;
      const parsed = parseResults(text);
      if(parsed.length>0){ proxyIdx=idx; consecutiveFails=0; return parsed; }
    }catch(e){}
  }
  consecutiveFails++;
  return null;
}

// ══════════════════════════════════════════════
// DEEP ANALYSIS — UNEXPECTED NUMBER ENGINE
// ══════════════════════════════════════════════
function deepAnalyze(results){
  if(results.length < 5) return Math.floor(Math.random()*10);

  const nums = results.map(r=>r.number);
  const N    = nums.length;

  // --- frequency tables at different windows ---
  const freq10  = Array(10).fill(0);
  const freq30  = Array(10).fill(0);
  const freq100 = Array(10).fill(0);
  for(let i=0;i<Math.min(10,N);i++)  freq10[nums[i]]++;
  for(let i=0;i<Math.min(30,N);i++)  freq30[nums[i]]++;
  for(let i=0;i<Math.min(100,N);i++) freq100[nums[i]]++;

  // --- last seen position for each digit ---
  const lastSeen = Array(10).fill(9999);
  for(let i=0;i<N;i++) if(lastSeen[nums[i]]===9999) lastSeen[nums[i]]=i;

  // --- recent streak analysis (last 10) ---
  const recent = nums.slice(0,Math.min(10,N));
  const colorStreak = { red:0, green:0 };
  let streak = 1;
  for(let i=1;i<recent.length;i++){
    if(getColor(recent[i])===getColor(recent[0])) streak++;
    else break;
  }
  colorStreak[getColor(recent[0])] = streak;

  // --- size streak ---
  let sizeStreak = 1;
  for(let i=1;i<recent.length;i++){
    if(getSize(recent[i])===getSize(recent[0])) sizeStreak++;
    else break;
  }

  // --- pair/triple pattern detection (last 20) ---
  const last20 = nums.slice(0,Math.min(20,N));
  // detect if same number appeared in last 3
  const veryRecent = new Set(nums.slice(0,3));
  // detect numbers that appeared 2+ times in last 10
  const hotInRecent = new Set();
  for(let d=0;d<10;d++) if(freq10[d]>=2) hotInRecent.add(d);

  // --- alternation pattern ---
  let altCount = 0;
  for(let i=0;i<Math.min(6,N-1);i++)
    if(getColor(nums[i])!==getColor(nums[i+1])) altCount++;
  const isAlternating = altCount >= 5;

  // --- gap score: how many periods ago each number last appeared ---
  // higher gap = more "overdue" in naive thinking = we AVOID those
  // because "overdue" is gambler's fallacy
  // Instead we look for subtle clustering patterns

  // --- positional modular pattern ---
  // check if there's a mod-3 or mod-5 cycle
  const periodNums = results.slice(0,Math.min(30,N));
  const modBucket = { 0:[], 1:[], 2:[], 3:[], 4:[] };
  periodNums.forEach((r,i)=>{ modBucket[i%5].push(r.number); });
  // current position mod 5 (next result = position 0 in fresh cycle)
  const nextMod = 0;
  const modCandidates = modBucket[nextMod];
  const modFreq = Array(10).fill(0);
  modCandidates.forEach(x=>modFreq[x]++);

  // --- scoring ---
  const scores = Array(10).fill(0);

  for(let d=0;d<10;d++){

    // 1. AVOID numbers very recently shown (last 3) — strong penalty
    if(nums[0]===d)   scores[d] -= 50;
    if(nums[1]===d)   scores[d] -= 30;
    if(nums[2]===d)   scores[d] -= 20;

    // 2. AVOID numbers hot in recent 10 (appeared 2+ times)
    if(hotInRecent.has(d)) scores[d] -= 25;

    // 3. AVOID numbers that dominated freq30 (top 2 most frequent)
    const sorted30 = [...freq30].map((f,i)=>({f,i})).sort((a,b)=>b.f-a.f);
    if(sorted30[0].i===d) scores[d] -= 20;
    if(sorted30[1].i===d) scores[d] -= 10;

    // 4. AVOID color continuation if streak >= 3
    if(colorStreak[getColor(recent[0])] >= 3 && getColor(d)===getColor(recent[0]))
      scores[d] -= 18;

    // 5. AVOID size continuation if streak >= 4
    if(sizeStreak >= 4 && getSize(d)===getSize(recent[0]))
      scores[d] -= 15;

    // 6. FAVOR alternating opposite color if alternating pattern detected
    if(isAlternating && getColor(d)!==getColor(nums[0]))
      scores[d] += 15;

    // 7. FAVOR numbers with balanced long-term frequency (100 window)
    const avgFreq100 = N>100 ? 10 : N/10;
    const deficit100 = avgFreq100 - freq100[d];
    scores[d] += Math.max(0, deficit100) * 1.2;

    // 8. Modular position pattern bonus
    if(modFreq[d] > 0) scores[d] += modFreq[d] * 3;

    // 9. Numbers not seen in last 8+ periods get a SMALL nudge
    // (not too much — avoid gambler's fallacy)
    if(lastSeen[d] >= 8 && lastSeen[d] < 20) scores[d] += 5;
    // But if WAY overdue (20+), reduce — means it's a rare number overall
    if(lastSeen[d] >= 20) scores[d] -= 3;

    // 10. CHAOS injection — per-period entropy seed
    // Uses current period string + digit to add unpredictability
    const periodSeed = results[0]?.period || '0';
    const entropy = ((parseInt(periodSeed.slice(-4)||'0') * (d+7) * 31) % 17) - 8;
    scores[d] += entropy;
  }

  // --- pick winner, but with a twist: if top score is shared by a common number, pick 2nd ---
  const ranked = scores.map((s,i)=>({s,i})).sort((a,b)=>b.s-a.s);

  // Top candidate
  const top = ranked[0].i;

  // If top candidate is in the most-expected set (freq10 top 3), skip to next
  const top3freq10 = [...freq10].map((f,i)=>({f,i})).sort((a,b)=>b.f-a.f).slice(0,3).map(x=>x.i);
  if(top3freq10.includes(top) && ranked[1]){
    // Check if 2nd place score is close enough (within 15 points)
    if(ranked[0].s - ranked[1].s < 15) return ranked[1].i;
  }

  return top;
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
const pad    = n => String(n).padStart(2,'0');
const nowStr = () => { const t=new Date(); return `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}` };

function showIdle(){
  const el = document.getElementById('predNum');
  el.className = 'predicted-num idle';
  el.textContent = '· · ·';
  ['tagColor','tagViolet','tagSize'].forEach(id=>{
    const el=document.getElementById(id);
    el.className='ptag'; el.textContent='';
  });
}

function showScanning(){
  const el = document.getElementById('predNum');
  el.className = 'predicted-num scanning';
  el.textContent = '· · ·';
}

function showPrediction(num, period){
  const el = document.getElementById('predNum');
  el.className = 'predicted-num ' + getNumClass(num);
  el.textContent = num;

  const tc = document.getElementById('tagColor');
  tc.className = 'ptag show ' + getColor(num);
  tc.textContent = getColor(num).toUpperCase();

  const tv = document.getElementById('tagViolet');
  if(isViolet(num)){ tv.className='ptag show violet'; tv.textContent='VIOLET'; }
  else { tv.className='ptag'; tv.textContent=''; }

  const ts = document.getElementById('tagSize');
  ts.className = 'ptag show ' + getSize(num);
  ts.textContent = getSize(num).toUpperCase();

  document.getElementById('periodNum').textContent = period || '—';
  document.getElementById('errMsg').style.display  = 'none';

  const t = nowStr();
  document.getElementById('updateTime').textContent = t;
  document.getElementById('topStatus').textContent  = 'LIVE · ' + t;
}

function showError(msg){
  document.getElementById('errMsg').textContent    = msg;
  document.getElementById('errMsg').style.display  = 'block';
  document.getElementById('topStatus').textContent = 'Retrying...';
}

function setBtn(disabled, text){
  const btn = document.getElementById('genBtn');
  btn.disabled = disabled;
  document.getElementById('btnMainText').textContent = text || 'GENERATE PREDICTION';
}

// ══════════════════════════════════════════════
// BACKGROUND POLL — only fetches data, NEVER shows prediction
// ══════════════════════════════════════════════
async function backgroundPoll(){
  const results = await fetchResults();
  if(!results || results.length===0){
    if(consecutiveFails >= 3) document.getElementById('topStatus').textContent = 'Retrying...';
    return;
  }
  results.sort((a,b) => b.period.localeCompare(a.period));
  history    = results;
  lastPeriod = results[0]?.period;
  predictionReady = true;

  // Update time silently
  const t = nowStr();
  document.getElementById('updateTime').textContent = t;
  document.getElementById('topStatus').textContent  = 'LIVE · ' + t;
  document.getElementById('errMsg').style.display   = 'none';
}

// ══════════════════════════════════════════════
// GENERATE BUTTON CLICK — user must click this
// ══════════════════════════════════════════════
async function onGenerateClick(){
  if(isGenerating) return;
  isGenerating = true;
  setBtn(true, 'ANALYZING...');
  showScanning();

  // If no data yet, fetch first
  if(!predictionReady || history.length === 0){
    const results = await fetchResults();
    if(!results || results.length===0){
      showError('API connection failed. Try again.');
      setBtn(false, 'GENERATE PREDICTION');
      showIdle();
      isGenerating = false;
      return;
    }
    results.sort((a,b) => b.period.localeCompare(a.period));
    history         = results;
    lastPeriod      = results[0]?.period;
    predictionReady = true;
  }

  // Simulate analysis delay for UX (feels like deep thinking)
  await new Promise(r => setTimeout(r, 1200 + Math.random()*800));

  // Run deep analysis
  const pred   = deepAnalyze(history);
  const nextP  = lastPeriod ? (BigInt(lastPeriod)+1n).toString() : '—';

  showPrediction(pred, nextP);
  setBtn(false, 'GENERATE PREDICTION');
  isGenerating = false;
}

// ══════════════════════════════════════════════
// START — only background data fetch, no auto-prediction
// ══════════════════════════════════════════════
backgroundPoll();
setInterval(backgroundPoll, 6000);
</script>
